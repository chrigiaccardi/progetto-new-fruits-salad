<header class="flex md:justify-center items-center justify-around">
    <input type="text" matInput placeholder="Cerca il tuo frutto preferito"
        (input)="fruitsStore.setFiltroRicerca(($event.target).value)"
        class="border border-gray-300 rounded-lg p-2 focus:ring-blue-200 w-full shadow-xl">
    
    <button matButton class="!text-green-700" (click)="apriDialogAggiungiFrutto()">
        <mat-icon>add</mat-icon>
        Nuovo Frutto
    </button>
</header>
