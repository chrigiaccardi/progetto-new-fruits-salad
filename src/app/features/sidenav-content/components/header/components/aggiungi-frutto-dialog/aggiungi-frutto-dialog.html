<div class="p-8 flex flex-col ">
    <!-- Creiamo due sezioni separate, la parte del titolo e la parte del form -->
    <div class="flex justify-between border-b-2 border-gray-400 pb-2">
        <h2 class="!text-green-700" mat-dialog-title>Aggiungi Nuovo Frutto</h2>
        <button tabindex="-1" mat-icon-button class="-mt-2 -mr-2" mat-dialog-close>
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <mat-dialog-content>
        <form class="">
            <div class="flex flex-rows gap-3">
                <div class="flex flex-col p-2 bg-blue-100 rounded-lg">
                    <mat-form-field class="w-full" appearance="outline">
                        <mat-label>Nome Frutto</mat-label>
                        <input matInput type="text" formControlName="name" placeholder="Nome Frutto">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Famiglia</mat-label>
                        <mat-select formControlName="family">
                            @for (fam of famiglieDisponibili(); track fam) {
                            <mat-option [value]="fam">{{fam}}</mat-option>
                            }
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Genere</mat-label>
                        <mat-select formControlName="genus">
                            @for (gen of generiDisponibili(); track gen) {
                            <mat-option [value]="gen">{{gen}}</mat-option>
                            }
                        </mat-select>
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Ordine</mat-label>
                        <mat-select formControlName="order">
                            @for (ord of ordiniDisponibili(); track ord) {
                            <mat-option [value]="ord">{{ord}}</mat-option>
                            }
                        </mat-select>
                    </mat-form-field>
                </div>

                <div class="p-2 bg-green-100 rounded-lg">
                    <p class="flex justify-center mb-2">Valori Nutrizionali per 100g:</p>
                    <div class="grid grid-cols-2 gap-2 !items-center justify-center">
                        <mat-form-field appearance="outline">
                            <input matInput type="text" formControlName="name">
                        </mat-form-field>
                        <mat-form-field appearance="outline">
                            <mat-label>Proteine</mat-label>
                            <input matInput type="text" formControlName="name">
                        </mat-form-field>
                        <mat-form-field appearance="outline">
                            <mat-label>Grasso</mat-label>
                            <input matInput type="text" formControlName="name">
                        </mat-form-field>
                        <mat-form-field appearance="outline">
                            <mat-label>Calorie</mat-label>
                            <input matInput type="text" formControlName="name">
                        </mat-form-field>
                        <mat-form-field appearance="outline">
                            <mat-label>Zucchero</mat-label>
                            <input matInput type="text" formControlName="name">
                        </mat-form-field>
                    </div>
                </div>
            </div>
        </form>

    </mat-dialog-content>
</div>
